name: Deploy Demo API

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 Deploy to Docker
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/external-api/app
            
            # Controleer of de map al een git repo is, zo niet: clone. Zo ja: pull.
            if [ ! -d ".git" ]; then
              git clone https://github.com/Ben-Edwrds/devpro-demo-api.git .
            else
              git fetch --all
              git reset --hard origin/main
            fi
            
            # Gebruik een tijdelijke Docker container voor npm install
            docker run --rm -v /opt/external-api/app:/app -w /app node:18 npm install
            
            # Herstart de Node.js container zonder sudo
            cd /opt/external-api
            docker compose restart ext_nodejs
